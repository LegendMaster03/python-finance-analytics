name: Run finance notebook

on:
  workflow_dispatch:
  push:
    paths:
      - "finance-analysis.ipynb"
      - "requirements.txt"
      - ".github/workflows/run-notebook.yml"

permissions:
  contents: write

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install notebook nbconvert ipykernel
          pip install -r requirements.txt
          python -m ipykernel install --user --name python3

      - name: Clear old notebook outputs
        run: |
          jupyter nbconvert --clear-output --inplace finance-analysis.ipynb

      - name: Execute notebook with retries
        run: |
          for attempt in 1 2 3; do
            echo "Notebook execution attempt $attempt..."

            if jupyter nbconvert \
              --to notebook \
              --execute finance-analysis.ipynb \
              --inplace \
              --ExecutePreprocessor.kernel_name=python3 \
              --ExecutePreprocessor.timeout=1200; then
              echo "Notebook execution succeeded."
              exit 0
            fi

            echo "Notebook execution failed on attempt $attempt."

            if [ "$attempt" -lt 3 ]; then
              echo "Waiting before retry..."
              sleep 180
            fi
          done

          echo "Notebook execution failed after 3 attempts."
          exit 1

      - name: Commit updated notebook
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Run finance analysis notebook"
          file_pattern: finance-analysis.ipynb
